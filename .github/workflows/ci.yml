name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check agents/ scripts/

      - name: Validate content
        run: uv run python scripts/validate_content.py

  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build site
        working-directory: site
        run: |
          npm install
          npm run build || echo "Build may fail without pagefind in CI — checking Astro build only"
          npx astro build

  build-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & typecheck MCP server
        working-directory: mcp-server
        run: |
          npm install
          npx tsc --noEmit
